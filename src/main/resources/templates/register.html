<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator Registration | CYBER-COMMAND</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/cyber-command.css}">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #020617;
            padding: 1rem;
        }

        .auth-container {
            width: 100%;
            max-width: 500px;
            z-index: 10;
            animation: authFadeIn 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes authFadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .auth-card {
            background: rgba(2, 6, 23, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyber-cyan), transparent);
            opacity: 0.5;
        }

        .cyber-input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .cyber-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem 1rem 1rem 3rem;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.3s;
        }

        .cyber-input:focus {
            outline: none;
            border-color: var(--cyber-cyan);
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .cyber-input-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--cyber-cyan);
            opacity: 0.5;
            transition: 0.3s;
        }

        .cyber-input:focus + .cyber-input-icon {
            opacity: 1;
            filter: drop-shadow(0 0 5px var(--cyber-cyan));
        }

        .btn-auth {
            width: 100%;
            background: var(--cyber-cyan);
            color: #020617;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
            filter: brightness(1.1);
        }

        .auth-alert {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border-radius: 12px;
            padding: 0.8rem;
            font-size: 0.75rem;
            margin-bottom: 2rem;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
        }

        .auth-corner {
            position: absolute;
            width: 20px; height: 20px;
            border: 2px solid var(--cyber-cyan);
            opacity: 0.3;
        }
        .top-left { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
        .bottom-right { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }
    </style>
</head>
<body>

    <div class="hud-background"></div>
    <div class="data-stream"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-corner top-left"></div>
            <div class="auth-corner bottom-right"></div>

            <div class="text-center mb-5">
                <div class="d-inline-block p-3 rounded-circle bg-white bg-opacity-5 mb-4 border border-white border-opacity-10">
                    <i class="bi bi-person-plus-fill fs-1 text-info" style="filter: drop-shadow(0 0 10px var(--cyber-cyan));"></i>
                </div>
                <h2 class="fw-900 text-uppercase mono tracking-tighter" style="color: var(--cyber-cyan);">Initialize Registry</h2>
                <p class="mono extra-small opacity-50">STAGING://TACTICAL_ENROLLMENT</p>
            </div>

            <!-- Alerts -->
            <div th:if="${param.error}" class="auth-alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> ERROR://[[${param.error}]]
            </div>

            <form th:action="@{/register}" method="post">
                <div class="cyber-input-group">
                    <input type="text" class="cyber-input" id="username" name="username" placeholder="OPERATOR_X_IDENTIFIER" required autofocus>
                    <i class="bi bi-person-badge cyber-input-icon"></i>
                </div>

                <div class="cyber-input-group">
                    <input type="email" class="cyber-input" id="email" name="email" placeholder="COMMS_CHANNEL@ENCRYPTED.NET" required>
                    <i class="bi bi-envelope-at cyber-input-icon"></i>
                </div>
                
                <div class="cyber-input-group">
                    <input type="password" class="cyber-input" id="password" name="password" placeholder="NEW_ACCESS_KEY" required>
                    <i class="bi bi-shield-lock cyber-input-icon"></i>
                </div>

                <button type="submit" class="btn-auth">Commit Registry</button>
            </form>

            <div class="mt-5 pt-4 border-top border-white border-opacity-5 text-center">
                <p class="mono extra-small opacity-40 mb-3">Already registered in the neural database?</p>
                <a th:href="@{/login}" class="text-info text-decoration-none mono extra-small fw-bold">
                    <i class="bi bi-arrow-left me-1"></i> Return to Authentication Console
                </a>
            </div>
        </div>
        
        <div class="text-center mt-4 opacity-30 mono" style="font-size: 0.6rem; letter-spacing: 3px;">
            REGISTRY_GATEWAY_V1.2 // PERSISTENT_TRUST_ENGINE
        </div>
    </div>

</body>
</html>
