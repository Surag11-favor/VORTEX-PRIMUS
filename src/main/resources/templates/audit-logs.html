<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Logs | Fraud Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --sidebar-bg: #1e293b;
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; }
        .sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--glass-border); position: fixed; height: 100vh; }
        .main-content { margin-left: 280px; flex-grow: 1; padding: 2rem; }
        .nav-link { display: flex; align-items: center; padding: 0.8rem 1.2rem; color: var(--text-muted) !important; border-radius: 12px; margin-bottom: 0.5rem; transition: all 0.3s; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: rgba(59, 130, 246, 0.1); color: #fff !important; }
        .nav-link.active { background: var(--accent-blue); color: #fff !important; }
        .glass-panel { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 2rem; }
        .log-item { border-left: 2px solid var(--accent-blue); padding-left: 1.5rem; position: relative; margin-bottom: 2rem; }
        .log-item::before { content: ''; position: absolute; left: -6px; top: 0; width: 10px; height: 10px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 10px var(--accent-blue); }
        .log-time { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }
        .log-action { font-weight: 700; color: #fff; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="p-4 border-bottom border-secondary mb-3">
            <a href="/dashboard" class="text-white text-decoration-none fw-800 d-flex align-items-center">
                <i class="bi bi-shield-lock-fill me-2 text-primary"></i> FRAUD INTEL
            </a>
        </div>
        <nav class="px-3">
            <a href="/dashboard" class="nav-link"><i class="bi bi-grid-fill me-2"></i> Overview</a>
            <a href="/threat-scan" class="nav-link"><i class="bi bi-eye-fill me-2"></i> Threat Scan</a>
            <a href="/mitigation-rules" class="nav-link"><i class="bi bi-shield-shaded me-2"></i> Mitigation Rules</a>
            <a href="/authorized-users" class="nav-link"><i class="bi bi-people-fill me-2"></i> Authorized Users</a>
            <a href="/audit-logs" class="nav-link active"><i class="bi bi-journal-text me-2"></i> Audit Logs</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="mb-4">
            <h2 class="fw-800">System Audit Logs</h2>
            <p class="text-muted">Traceability of all investigator actions and system events.</p>
        </div>

        <div class="glass-panel">
            <div th:each="log : ${logs}" class="log-item">
                <div class="log-time" th:text="${#temporals.format(log.timestamp, 'MMM dd, HH:mm:ss')}">Mar 23, 10:45:12</div>
                <div class="log-action" th:text="${log.action}">Threat Scan Performed</div>
                <div class="text-muted small">
                    Performed by: <span class="text-primary fw-bold" th:text="${log.performedBy}">admin</span>
                </div>
                <div class="mt-2 text-white-50" th:text="${log.details}">Analyzed payload chunk (ID: 104)</div>
            </div>

            <div th:if="${#lists.isEmpty(logs)}" class="text-center py-5 text-muted">
                No system activity logged yet.
            </div>
        </div>
    </main>
</body>
</html>
